spring.application.name=auth-service
server.port=4005

spring.cloud.aws.region.static=us-east-1
spring.cloud.aws.secretsmanager.enabled=true

spring.config.import=aws-secretsmanager:auth-db-secret,aws-secretsmanager:jwt-secret

spring.datasource.url=jdbc:postgresql://auth-db.c41uusgs8d4c.us-east-1.rds.amazonaws.com:5432/authdb
spring.datasource.username=${username}
spring.datasource.password=${password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
